<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מחולל שתי אותיות בעברית</title>
  <style>
    :root {
      --bg1: #f8fafc;
      --bg2: #e2e8f0;
      --text: #0f172a;
      --panel: rgba(255, 255, 255, 0.72);
      --shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Noto Sans Hebrew", "Arial", sans-serif;
      background:
        radial-gradient(circle at top, #ffffff 0%, var(--bg1) 38%, var(--bg2) 100%);
      color: var(--text);
    }

    body { display: grid; place-items: center; }

    .wrap {
      width: min(96vw, 1200px);
      height: min(92vh, 900px);
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .stage {
      width: min(90vw, 1000px);
      height: min(80vh, 700px);
      display: grid;
      place-items: center;
      border-radius: 32px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
      user-select: none;
      position: relative;
    }

    .word {
      font-size: clamp(8rem, 28vw, 20rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.03em;
      text-align: center;
      white-space: nowrap;
      min-height: 1.2em;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .controls {
      position: absolute;
      top: 1rem;
      width: 100%;
      text-align: center;
    }

    .toggle {
      border: none;
      border-radius: 999px;
      padding: 0.6rem 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    .hint {
      position: absolute;
      bottom: 1rem;
      width: 100%;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="stage">
      <div class="controls">
        <button id="toggle" class="toggle">מילים אמיתיות: כבוי</button>
      </div>
      <div id="word" class="word">אב</div>
      <div class="hint">לחיצה על המילה מקריאה. לחיצה מחוץ לריבוע מגרילה.</div>
    </section>
  </main>

<script>
const letters = ["א","ב","ג","ד","ה","ו","ז","ח","ט","י","כ","ל","מ","נ","ס","ע","פ","צ","ק","ר","ש","ת"];
const finals = { "כ":"ך","מ":"ם","נ":"ן","פ":"ף","צ":"ץ" };

const niqqud = ["\u05B8","\u05B7","\u05B5","\u05B6","\u05B9"];

const realWords = ["אָב","אֵם","אַח","אֵל","בֵּן","בַּת","גַּג","דָּג","יָד","לֵב","כַּף","פֶּה"];

let realMode = false;

const wordEl = document.getElementById("word");
const toggle = document.getElementById("toggle");

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)] }

function gen(){
  if(realMode){
    wordEl.textContent = rand(realWords);
    return;
  }
  let l1 = rand(letters);
  let l2 = rand(letters);
  if(finals[l2]) l2 = finals[l2];
  wordEl.textContent = l1 + rand(niqqud) + l2;
}

function speak(){
  let u = new SpeechSynthesisUtterance(wordEl.textContent);
  u.lang="he-IL";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

wordEl.onclick = (e)=>{ e.stopPropagation(); speak(); };

document.body.onclick = (e)=>{
  if(!document.querySelector(".stage").contains(e.target)){
    gen();
  }
};

toggle.onclick = (e)=>{
  e.stopPropagation();
  realMode = !realMode;
  toggle.textContent = "מילים אמיתיות: " + (realMode ? "פועל":"כבוי");
  gen();
};

window.onkeydown = (e)=>{
  if(e.key==="Enter"){ speak(); return; }
  gen();
};

gen();
</script>
</body>
</html>
