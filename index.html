<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מחולל שתי אותיות בעברית</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial;
      background: #f3f4f6;
    }

    .stage {
      width: min(70vw, 700px);
      height: min(60vh, 500px);
      display: grid;
      place-items: center;
      border-radius: 30px;
      background: white;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      position: relative;
    }

    .word {
      font-size: clamp(8rem, 32vw, 22rem);
      cursor: pointer;
    }

    .toggle {
      position: absolute;
      top: 10px;
    }
  </style>
</head>
<body>

<div class="stage">
  <button id="toggle" class="toggle">מילים אמיתיות: כבוי</button>
  <div id="word" class="word">אב</div>
</div>

<script>
const letters = ["א","ב","ג","ד","ה","ו","ז","ח","ט","י","כ","ל","מ","נ","ס","ע","פ","צ","ק","ר","ש","ת"];
const finals = { "כ":"ך","מ":"ם","נ":"ן","פ":"ף","צ":"ץ" };
const niqqud = ["\u05B8","\u05B7","\u05B5","\u05B6","\u05B9"];

const realWords = ["אָב","אֵם","אַח","אֵל","בֵּן","בַּת","גַּג","דָּג","יָד","לֵב","כַּף","פֶּה"];

let realMode = false;

const wordEl = document.getElementById("word");
const toggle = document.getElementById("toggle");
const stage = document.querySelector(".stage");

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)] }

function gen(){
  if(realMode){
    wordEl.textContent = rand(realWords);
    return;
  }
  let l1 = rand(letters);
  let l2 = rand(letters);
  if(finals[l2]) l2 = finals[l2];
  wordEl.textContent = l1 + rand(niqqud) + l2;
}

function speak(){
  let u = new SpeechSynthesisUtterance(wordEl.textContent);
  u.lang="he-IL";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

wordEl.onclick = (e)=>{ e.stopPropagation(); speak(); };

stage.onclick = (e)=>{
  if(e.target === toggle || toggle.contains(e.target)) return;
  speak();
};

document.body.onclick = (e)=>{
  if(stage.contains(e.target)) return;
  gen();
};

toggle.onclick = (e)=>{
  e.stopPropagation();
  realMode = !realMode;
  toggle.textContent = "מילים אמיתיות: " + (realMode ? "פועל":"כבוי");
  gen();
};

window.onkeydown = (e)=>{
  if(e.key==="Enter"){ speak(); return; }
  gen();
};

gen();
</script>

</body>
</html>
